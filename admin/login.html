<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | REEL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #D4AF37;
      --gold-dim: rgba(212,175,55,0.15);
      --gold-border: rgba(212,175,55,0.25);
      --black: #0A0A0A;
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'Outfit', sans-serif;
    }
    html, body { height: 100%; }
    body {
      background: var(--black);
      font-family: var(--font-body);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── ANIMATED BACKGROUND ── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
    }
    .bg-orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(212,175,55,0.5), transparent 70%);
      top: -200px; left: -200px;
      animation: orbDrift 12s ease-in-out infinite alternate;
    }
    .bg-orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(212,175,55,0.3), transparent 70%);
      bottom: -150px; right: -100px;
      animation: orbDrift 9s ease-in-out infinite alternate-reverse;
    }
    .bg-orb-3 {
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(255,215,0,0.25), transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: orbPulse 6s ease-in-out infinite;
    }
    @keyframes orbDrift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }
    @keyframes orbPulse {
      0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.25; }
      50%       { transform: translate(-50%,-50%) scale(1.15); opacity: 0.45; }
    }

    /* Animated particles */
    .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .particle {
      position: absolute;
      width: 2px; height: 2px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0;
      animation: floatUp var(--dur) ease-in infinite;
      animation-delay: var(--delay);
    }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) scale(0); }
      10%  { opacity: 0.8; transform: translateY(-20px) scale(1); }
      90%  { opacity: 0.4; transform: translateY(-120px) scale(0.8); }
      100% { opacity: 0; transform: translateY(-140px) scale(0); }
    }

    /* Grid lines */
    .grid-overlay {
      position: fixed; inset: 0; z-index: 0;
      background: #0A0A0A;
    }

    /* ── LOGIN CARD ── */
    .login-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      padding: 20px;
    }
    @keyframes cardEntrance {
      0%   { opacity: 0; transform: translateY(50px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0)   scale(1); }
    }
    .login-card {
      background: rgba(12,12,12,0.75);
      backdrop-filter: blur(30px);
      border: 1px solid var(--gold-border);
      border-radius: 28px;
      padding: 56px 48px;
      text-align: center;
      box-shadow:
        0 60px 120px rgba(0,0,0,0.9),
        inset 0 1px 0 rgba(212,175,55,0.12),
        0 0 0 1px rgba(255,255,255,0.02);
      animation: cardEntrance 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      position: relative;
      overflow: hidden;
    }
    .login-card::after {
      content: '';
      position: absolute;
      top: -80px; left: -80px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(212,175,55,0.08), transparent 70%);
      pointer-events: none;
    }

    /* Logo ring animation */
    .logo-ring-wrap {
      width: 100px; height: 100px;
      margin: 0 auto 28px;
      position: relative;
    }
    @keyframes ringRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes ringRotateReverse {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }
    .ring-outer {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1px solid transparent;
      border-top-color: var(--gold);
      border-right-color: rgba(212,175,55,0.3);
      animation: ringRotate 3s linear infinite;
    }
    .ring-inner {
      position: absolute; inset: 8px;
      border-radius: 50%;
      border: 1px solid transparent;
      border-bottom-color: rgba(212,175,55,0.6);
      border-left-color: rgba(212,175,55,0.2);
      animation: ringRotateReverse 2s linear infinite;
    }
    .ring-logo {
      position: absolute; inset: 16px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(212,175,55,0.08);
      border-radius: 50%;
    }
    .ring-logo img { width: 48px; height: 48px; object-fit: contain; }

    .login-eyebrow {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: var(--gold);
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeSlideIn 0.7s 0.4s ease forwards;
    }
    .login-title {
      font-family: var(--font-display);
      font-size: 2.6rem;
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 6px;
      color: #fff;
      opacity: 0;
      animation: fadeSlideIn 0.7s 0.5s ease forwards;
    }
    .login-title .gold { color: var(--gold); }
    .login-sub {
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeSlideIn 0.7s 0.6s ease forwards;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Divider line */
    .login-divider {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeSlideIn 0.7s 0.7s ease forwards;
    }
    .login-divider span {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-border), transparent);
    }
    .login-divider small {
      font-size: 0.7rem; color: rgba(255,255,255,0.3);
      text-transform: uppercase; letter-spacing: 2px;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
      text-align: left;
      opacity: 0;
      animation: fadeSlideIn 0.7s 0.75s ease forwards;
    }
    .form-group label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 8px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap svg {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      color: rgba(212,175,55,0.5);
      pointer-events: none;
    }
    .form-group input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px 16px 16px 48px;
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.95rem;
      transition: all 0.3s ease;
      -webkit-appearance: none;
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.2); }
    .form-group input:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(212,175,55,0.05);
      box-shadow: 0 0 0 4px rgba(212,175,55,0.08), 0 8px 20px rgba(0,0,0,0.3);
    }
    .error-msg {
      color: #ff5757;
      font-size: 0.82rem;
      margin-top: -12px;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      background: rgba(255,87,87,0.08);
      border: 1px solid rgba(255,87,87,0.2);
      border-radius: 8px;
    }
    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #D4AF37, #B8962E, #D4AF37);
      background-size: 200% 100%;
      background-position: 0% 50%;
      border: none;
      border-radius: 12px;
      color: #000;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.4s ease;
      box-shadow: 0 8px 30px rgba(212,175,55,0.25);
      opacity: 0;
      animation: fadeSlideIn 0.7s 0.85s ease forwards;
      position: relative;
      overflow: hidden;
    }
    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }
    .submit-btn:hover::before { transform: translateX(100%); }
    .submit-btn:hover {
      background-position: 100% 50%;
      box-shadow: 0 12px 40px rgba(212,175,55,0.45);
      transform: translateY(-2px);
    }
    .submit-btn:active { transform: translateY(0); }

    .return-link {
      display: inline-block;
      margin-top: 28px;
      color: rgba(255,255,255,0.3);
      font-size: 0.8rem;
      text-decoration: none;
      transition: color 0.3s;
      opacity: 0;
      animation: fadeSlideIn 0.7s 0.95s ease forwards;
    }
    .return-link:hover { color: var(--gold); }
  </style>
</head>
<body>
  <!-- Background -->
  <div class="bg-canvas">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>
  <div class="grid-overlay"></div>
  <div class="particles" id="particles"></div>

  <!-- Login Card -->
  <div class="login-wrap">
    <div class="login-card">

      <!-- Animated ring logo -->
      <div class="logo-ring-wrap">
        <div class="ring-outer"></div>
        <div class="ring-inner"></div>
        <div class="ring-logo">
          <img src="../Images/BG/logo%20bg.png" alt="REE" onerror="this.outerHTML='<span style=\'font-size:1.8rem\'>⚜</span>'" />
        </div>
      </div>

      <div class="login-eyebrow">Executive Portal</div>
      <h1 class="login-title">Secure <span class="gold">Access</span></h1>
      <p class="login-sub">Royalty Executive Empire LIMITED — Admin Control Center</p>

      <div class="login-divider">
        <span></span><small>Authenticate</small><span></span>
      </div>

      <form id="admin-login-form">
        <div class="form-group">
          <label for="admin-pass">Master Password</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="admin-pass" placeholder="Enter executive password" required autofocus />
          </div>
        </div>

        <div id="login-error" class="error-msg">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Incorrect password. Access denied.
        </div>

        <button type="submit" class="submit-btn">Authenticate &amp; Enter</button>
      </form>

      <a href="../index.html" class="return-link">&larr; Return to Public Website</a>
    </div>
  </div>

  <script>
    // Generate floating particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}%;
        --dur: ${3 + Math.random() * 5}s;
        --delay: ${Math.random() * 8}s;
        width: ${1 + Math.random() * 2}px;
        height: ${1 + Math.random() * 2}px;
      `;
      container.appendChild(p);
    }

    // Login logic
    const MASTER_PASS = "REEGLOBAL@090021";
    document.getElementById('admin-login-form').addEventListener('submit', e => {
      e.preventDefault();
      const val = document.getElementById('admin-pass').value;
      const err = document.getElementById('login-error');
      const card = document.querySelector('.login-card');
      if (val === MASTER_PASS) {
        sessionStorage.setItem('ree_admin_auth', 'true');
        document.querySelector('.submit-btn').textContent = '✓ Access Granted…';
        document.querySelector('.submit-btn').style.background = 'linear-gradient(135deg,#25D366,#128C7E)';
        setTimeout(() => window.location.href = 'index.html', 800);
      } else {
        err.style.display = 'flex';
        card.style.animation = 'none';
        card.style.transition = 'transform 0.1s';
        const shakes = ['-8px','8px','-6px','6px','-3px','3px','0'];
        shakes.forEach((v,i) => setTimeout(() => card.style.transform = `translateX(${v})`, i * 70));
      }
    });
  </script>
</body>
</html>
