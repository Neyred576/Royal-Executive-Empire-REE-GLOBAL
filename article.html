<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article | REE Global — Royalty Executive Empire</title>
  <meta name="description" content="Read insightful articles from Royalty Executive Empire (REE Global) on business, luxury, technology, and global impact." />
  <meta name="author" content="Onosedeba Israel Ose" />
  <meta name="robots" content="index, follow" />
  <meta property="og:type" content="article" />
  <meta property="og:image" content="Images/BG/logo%20bg.png" />
  <meta name="theme-color" content="#D4AF37" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Article Hero ── */
    .article-hero {
      position: relative;
      height: 70vh;
      min-height: 500px;
      overflow: hidden;
      display: flex; align-items: flex-end;
    }
    .article-hero-bg {
      position: absolute; inset: 0;
      background: var(--black-900);
    }
    .article-hero-bg img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      opacity: 0.45;
      transition: opacity 0.5s;
    }
    .article-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.2) 100%);
    }
    .article-hero-body {
      position: relative; z-index: 2;
      width: 100%;
      padding: 0 0 60px;
    }
    .article-eyebrow {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 16px;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--gold-300);
    }
    .article-eyebrow::before {
      content: ''; display: block;
      width: 30px; height: 1px;
      background: var(--gold-gradient);
    }
    .article-tag {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 999px;
      background: var(--gold-fill);
      border: 1px solid var(--gold-border);
      color: var(--gold-300);
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      margin-bottom: 20px;
    }
    .article-hero-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4.5vw, 3.8rem);
      color: #fff; line-height: 1.1;
      margin-bottom: 20px;
      max-width: 900px;
    }
    .article-hero-meta {
      display: flex; align-items: center; gap: 20px;
      flex-wrap: wrap;
    }
    .article-meta-item {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.83rem; color: rgba(255,255,255,0.5);
    }
    .article-meta-item svg { width: 14px; height: 14px; opacity: 0.7; }

    /* ── Article Body ── */
    .article-section { padding: 80px 0 100px; }
    .article-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 72px;
      align-items: start;
    }

    /* ── Article Content ── */
    .article-content {
      color: var(--w70);
      font-size: 1.12rem;
      line-height: 2;
    }
    .article-content p { margin-bottom: 28px; }
    .article-content p:first-child {
      font-size: 1.25rem;
      color: var(--w80);
      line-height: 1.85;
    }
    .article-content h2 {
      color: #fff;
      font-family: var(--font-display);
      font-size: 2rem;
      margin: 48px 0 20px;
      line-height: 1.2;
    }
    .article-content h3 {
      color: var(--gold-300);
      font-family: var(--font-display);
      font-size: 1.5rem;
      margin: 36px 0 16px;
    }
    .article-content blockquote {
      border-left: 3px solid var(--gold-300);
      padding: 28px 32px;
      background: rgba(212,175,55,0.04);
      border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
      font-size: 1.25rem;
      font-style: italic;
      color: #fff;
      margin: 40px 0;
    }

    /* Back button */
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--w50); text-decoration: none;
      font-size: 0.85rem; text-transform: uppercase;
      letter-spacing: 1px; transition: color 0.3s;
      margin-bottom: 40px;
    }
    .back-btn:hover { color: var(--gold-300); }
    .back-btn svg { width: 16px; height: 16px; }

    /* Share bar */
    .article-share {
      display: flex; align-items: center; gap: 12px;
      margin-top: 48px; padding-top: 32px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .share-label { font-size: 0.78rem; color: var(--w50); letter-spacing: 1px; text-transform: uppercase; }
    .share-btn {
      display: flex; align-items: center; justify-content: center;
      width: 38px; height: 38px;
      border: 1px solid var(--gold-border);
      border-radius: 50%;
      color: var(--w60);
      text-decoration: none;
      transition: all 0.3s;
    }
    .share-btn:hover { border-color: var(--gold-300); color: var(--gold-300); background: var(--gold-fill); }
    .share-btn svg { width: 16px; height: 16px; }

    /* ── Sidebar ── */
    .article-sidebar { position: sticky; top: 100px; }
    .sidebar-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--gold-border);
      border-radius: var(--radius-lg);
      padding: 28px;
      margin-bottom: 24px;
    }
    .sidebar-card-title {
      font-size: 0.72rem; font-weight: 800;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--gold-300);
      padding-bottom: 14px;
      border-bottom: 1px solid var(--gold-border);
      margin-bottom: 18px;
    }
    .rel-post {
      display: flex; gap: 12px;
      align-items: flex-start;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      text-decoration: none;
    }
    .rel-post:last-child { margin-bottom: 0; padding-bottom: 0; border: none; }
    .rel-thumb {
      width: 56px; height: 56px;
      border-radius: 8px; background: var(--black-700);
      border: 1px solid var(--gold-border);
      flex-shrink: 0; overflow: hidden;
      display: flex; align-items: center;
      justify-content: center; font-size: 1.4rem;
      position: relative;
    }
    .rel-thumb img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .rel-title {
      font-size: 0.83rem; color: var(--w70);
      line-height: 1.4; transition: color 0.3s;
    }
    .rel-post:hover .rel-title { color: var(--gold-300); }
    .rel-date { font-size: 0.72rem; color: var(--w40); margin-top: 4px; }

    /* ── Progress bar ── */
    .reading-progress {
      position: fixed; top: 0; left: 0;
      height: 3px; width: 0%;
      background: var(--gold-gradient);
      z-index: 9999;
      transition: width 0.1s linear;
    }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--black-700) 25%, rgba(255,255,255,0.04) 50%, var(--black-700) 75%);
      background-size: 200% 100%;
      animation: skeletonLoading 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes skeletonLoading { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    @media(max-width:1100px){ .article-layout { grid-template-columns: 1fr; } .article-sidebar { position: static; } }
  </style>
</head>
<body>
<div class="bg-animated-glow"></div>
<div class="reading-progress" id="reading-progress"></div>

<!-- NAVIGATION -->
<nav id="main-nav" class="main-nav" role="navigation" aria-label="Main navigation">
  <div class="nav-inner">

      <div class="nav-logo-img-wrap">

    </a>

<!-- LOADING SKELETON (replaced by real content) -->
<main id="article-main">
  <div class="article-hero" style="align-items:center;justify-content:center;min-height:40vh">
    <div class="container" style="position:relative;z-index:2;padding-top:120px;padding-bottom:60px">
      <div class="skeleton" style="height:14px;width:120px;margin-bottom:20px"></div>
      <div class="skeleton" style="height:50px;width:80%;margin-bottom:14px"></div>
      <div class="skeleton" style="height:50px;width:60%;margin-bottom:30px"></div>
      <div class="skeleton" style="height:14px;width:200px"></div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-bar">
    <div class="container">
      <div class="footer-bar-inner">
        <p class="footer-copy">&copy; <span id="footer-year"></span> Royalty Executive Empire (REE Global). All Rights Reserved.</p>
        <nav aria-label="Legal links">
          <ul class="footer-legal">
            <li><a href="privacy.html">Privacy Policy</a></li>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/main.js"></script>

<script>
  document.getElementById('footer-year').textContent = new Date().getFullYear();

  // Reading progress bar
  window.addEventListener('scroll', () => {
    const doc = document.documentElement;
    const scrolled = doc.scrollTop;
    const total = doc.scrollHeight - doc.clientHeight;
    document.getElementById('reading-progress').style.width = (scrolled / total * 100) + '%';
  });

  function formatContent(raw) {
    if (!raw) return '<p>No content available.</p>';
    // Split on double newlines first (paragraphs), then single newlines
    return raw.split(/\n\n+/).map(block => {
      block = block.trim();
      if (!block) return '';
      // If looks like a heading
      if (block.startsWith('# ')) return `<h2>${block.slice(2)}</h2>`;
      if (block.startsWith('## ')) return `<h3>${block.slice(3)}</h3>`;
      // Otherwise paragraph (handle single newlines inside)
      return `<p>${block.replace(/\n/g, '<br>')}</p>`;
    }).filter(Boolean).join('');
  }

  function renderRelated(blogs, currentId) {
    const others = blogs.filter(b => b.id !== currentId).slice(0, 4);
    if (!others.length) return '<p style="color:var(--w40);font-size:0.85rem">No other articles yet.</p>';
    return others.map(b => `
      <a href="article.html?id=${b.id}" class="rel-post">
        <div class="rel-thumb">${b.image ? `<img src="${b.image}" alt="${b.title}" style="object-position:${b.imagePos||'center'}">` : '📰'}</div>
        <div><div class="rel-title">${b.title}</div><div class="rel-date">${b.date || ''}</div></div>
      </a>
    `).join('');
  }

  function loadArticle() {
    if (!window.db) { setTimeout(loadArticle, 60); return; }

    const urlParams = new URLSearchParams(window.location.search);
    const articleId = urlParams.get('id');
    const main = document.getElementById('article-main');

    if (!articleId) {
      main.innerHTML = `<div style="text-align:center;padding:200px 20px"><h1 style="color:#fff;font-family:var(--font-display);font-size:3rem">Article Not Found</h1><a href="blog.html" style="color:var(--gold-300);margin-top:20px;display:inline-block">← Return to Blog</a></div>`;
      return;
    }

    // Load the article and all blogs for sidebar
    Promise.all([
      window.db.collection('blogs').doc(articleId).get(),
      window.db.collection('blogs').orderBy('timestamp', 'desc').limit(8).get()
    ]).then(([doc, allSnap]) => {
      if (!doc.exists) {
        main.innerHTML = `<div style="text-align:center;padding:200px 20px"><h1 style="color:#fff;font-family:var(--font-display);font-size:3rem">Article Not Found</h1><a href="blog.html" style="color:var(--gold-300);margin-top:20px;display:inline-block">← Return to Blog</a></div>`;
        return;
      }

      const b = doc.data();
      const allBlogs = allSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      const pageUrl = encodeURIComponent(window.location.href);
      const pageTitle = encodeURIComponent(b.title || '');

      // Update page title and meta
      document.title = `${b.title} | REE Global`;

      main.innerHTML = `
        <!-- Hero -->
        <div class="article-hero">
          <div class="article-hero-bg">
            ${b.image ? `<img src="${b.image}" alt="${b.title}" style="object-position:${b.imagePos||'center center'}">` : ''}
          </div>
          <div class="article-hero-overlay"></div>
          <div class="article-hero-body">
            <div class="container">
              <div class="article-tag">${b.category || 'Insight'}</div>
              <h1 class="article-hero-title">${b.title}</h1>
              <div class="article-hero-meta">
                <div class="article-meta-item">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  ${b.date || 'REE Global'}
                </div>
                <div class="article-meta-item">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                  Royalty Executive Empire
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Body -->
        <section class="article-section">
          <div class="container">
            <div class="article-layout">
              <!-- Content -->
              <div>
                <a href="blog.html" class="back-btn">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
                  Back to Blog
                </a>
                <article class="article-content">
                  ${formatContent(b.content)}
                </article>
                <!-- Share -->
                <div class="article-share">
                  <span class="share-label">Share:</span>
                  <a href="https://twitter.com/intent/tweet?text=${pageTitle}&url=${pageUrl}" target="_blank" rel="noopener" class="share-btn" aria-label="Share on X">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.74l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                  </a>
                  <a href="https://www.facebook.com/sharer/sharer.php?u=${pageUrl}" target="_blank" rel="noopener" class="share-btn" aria-label="Share on Facebook">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
                  </a>
                  <a href="https://wa.me/?text=${pageTitle}%20${pageUrl}" target="_blank" rel="noopener" class="share-btn" aria-label="Share on WhatsApp">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                  </a>
                </div>
              </div>

              <!-- Sidebar -->
              <aside class="article-sidebar">
                <div class="sidebar-card">
                  <div class="sidebar-card-title">More Articles</div>
                  ${renderRelated(allBlogs, articleId)}
                </div>
                <div class="sidebar-card" style="text-align:center">
                  <div class="sidebar-card-title">Follow REE Global</div>
                  <p style="color:var(--w50);font-size:0.85rem;margin-bottom:18px;line-height:1.7">Stay updated with our latest insights, projects and announcements.</p>
                  <a href="https://www.instagram.com/royaltyexecutiveempire/" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:var(--gold-gradient);color:var(--black-900);border-radius:8px;font-size:0.82rem;font-weight:700;text-decoration:none;transition:all 0.3s">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="2" y="2" width="20" height="20" rx="5" ry="5" /><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" /></svg>
                    Follow on Instagram
                  </a>
                </div>
              </aside>
            </div>
          </div>
        </section>
      `;

      // Trigger scroll animations for newly added elements
      setTimeout(() => {
        document.querySelectorAll('.article-content, .article-hero-title, .article-hero-body').forEach(el => el.classList.add('in-view'));
      }, 100);

    }).catch(err => {
      console.error('Article load error:', err);
      document.getElementById('article-main').innerHTML = `<div style="text-align:center;padding:200px 20px"><h1 style="color:#fff;font-family:var(--font-display)">Error Loading Article</h1><p style="color:var(--w50);margin-top:12px">Please check your connection and try again.</p><a href="blog.html" style="color:var(--gold-300);margin-top:20px;display:inline-block">← Return to Blog</a></div>`;
    });
  }

  loadArticle();
</script>
</body>
</html>
