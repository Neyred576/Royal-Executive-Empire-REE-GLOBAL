<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article | REE Global</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Article Specific Styles */
    .article-header { padding: 140px 0 60px; background: var(--black-900); position:relative; overflow:hidden; border-bottom: 1px solid var(--gold-border); text-align: center; }
    .article-meta { display: inline-flex; align-items: center; gap: 16px; margin-bottom: 24px; font-size: 0.9rem; color: var(--gold-300); text-transform: uppercase; letter-spacing: 2px; }
    .article-title { font-family: var(--font-display); font-size: clamp(2.5rem, 5vw, 4.5rem); color: #fff; line-height: 1.1; margin-bottom: 30px; max-width: 900px; margin-left: auto; margin-right: auto; }
    
    .article-hero-img { width: 100%; max-height: 70vh; min-height: 400px; object-fit: cover; border-radius: var(--radius-xl); border: 1px solid var(--gold-border); box-shadow: 0 20px 40px rgba(0,0,0,0.4); margin-bottom: 60px; transform: translateY(0); transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .article-hero-img:hover { transform: translateY(-5px); box-shadow: var(--gold-glow); }
    
    .article-content { max-width: 800px; margin: 0 auto; color: var(--w70); font-size: 1.15rem; line-height: 2; padding-bottom: 100px; }
    .article-content p { margin-bottom: 24px; }
    .article-content h2, .article-content h3 { color: #fff; font-family: var(--font-display); margin: 40px 0 20px; }
    .article-content blockquote { border-left: 3px solid var(--gold-300); padding-left: 24px; font-size: 1.3rem; font-style: italic; color: #fff; margin: 40px 0; background: var(--w08); padding: 30px; border-radius: 0 var(--radius-lg) var(--radius-lg) 0; }
    
    .back-btn { display: inline-flex; align-items: center; gap: 8px; color: var(--w50); text-decoration: none; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; margin-bottom: 40px; }
    .back-btn:hover { color: var(--gold-300); }
    
    /* Skeleton Loader */
    .skeleton { background: linear-gradient(90deg, var(--black-700) 25%, var(--black-600) 50%, var(--black-700) 75%); background-size: 200% 100%; animation: skeletonLoading 1.5s infinite; border-radius: 4px; }
    @keyframes skeletonLoading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>
<div class="bg-animated-glow"></div>

<!-- NAVIGATION -->
<nav id="main-nav" class="main-nav scrolled" role="navigation" aria-label="Main navigation">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo" aria-label="REE Global Home">
      <div class="nav-logo-img-wrap">
        <img src="Images/BG/logo%20bg.png" alt="REE Global Logo" class="nav-logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
      </div>
      <div class="nav-logo-text">
        <span class="nav-brand-name">REE Global</span>
        <span class="nav-brand-sub">Royalty Executive Empire</span>
      </div>
    </a>
    <ul class="nav-links" id="nav-links" role="list">
      <li><a href="index.html" class="nav-link">Home</a></li>
      <li><a href="about.html" class="nav-link">About REE</a></li>
      <li class="nav-item-dropdown">
        <a href="#" class="nav-link">Divisions <span class="drop-arrow">▾</span></a>
        <ul class="nav-dropdown">
          <li><a href="real-estate.html">Real Estate</a></li>
          <li><a href="music-store.html">Music & Entertainment</a></li>
          <li><a href="index.html#services">Consulting</a></li>
        </ul>
      </li>
      <li><a href="shop.html" class="nav-link">Shop</a></li>
      <li><a href="portfolio.html" class="nav-link">Portfolio</a></li>
      <li><a href="blog.html" class="nav-link active">Blog</a></li>
      <li><a href="contact.html" class="nav-link nav-link-cta">Contact Us</a></li>
    </ul>
    <div class="nav-actions">
      <a href="cart.html" class="nav-icon cart-icon" aria-label="Shopping Cart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="cart-count">0</span></a>
    </div>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="nav-links">
      <span class="ham-line"></span><span class="ham-line"></span><span class="ham-line"></span>
    </button>
  </div>
  <div class="nav-overlay" id="nav-overlay" aria-hidden="true"></div>
</nav>

<!-- DYNAMIC ARTICLE CONTAINER -->
<main id="single-article-container" style="min-height: 100vh;">
  <!-- Loading State -->
  <header class="article-header">
    <div class="container" style="position:relative; z-index:2;">
      <div class="skeleton" style="height: 20px; width: 200px; margin: 0 auto 30px;"></div>
      <div class="skeleton" style="height: 60px; width: 80%; margin: 0 auto;"></div>
    </div>
  </header>
  <section class="section section--dark">
    <div class="container">
      <div class="skeleton" style="height: 500px; width: 100%; margin-bottom: 60px; border-radius: var(--radius-xl);"></div>
      <div class="article-content">
        <div class="skeleton" style="height: 20px; width: 100%; margin-bottom: 15px;"></div>
        <div class="skeleton" style="height: 20px; width: 100%; margin-bottom: 15px;"></div>
        <div class="skeleton" style="height: 20px; width: 80%; margin-bottom: 15px;"></div>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="footer-bar"><div class="container"><div class="footer-bar-inner"><p class="footer-copy">&copy; <span id="footer-year"></span> Royalty Executive Empire (REE Global). All Rights Reserved.</p></div></div></div>
</footer>

<!-- Firebase Integration -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/main.js"></script>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  const container = document.getElementById('single-article-container');
  
  // Get ID from URL e.g. article.html?id=123
  const urlParams = new URLSearchParams(window.location.search);
  const articleId = urlParams.get('id');

  if (!articleId) {
    container.innerHTML = `<div style="text-align:center; padding: 200px 20px;"><h1 style="color:#fff;">Article Not Found</h1><a href="blog.html" class="gold-link">Return to Blog</a></div>`;
    return;
  }

  // Wait for Firebase to be ready (main.js initializes it, but we wait just in case)
  const loadArticle = async () => {
    if (!window.db) {
      setTimeout(loadArticle, 50);
      return;
    }
    try {
      const doc = await window.db.collection('blogs').doc(articleId).get();
      if (!doc.exists) {
        container.innerHTML = `<div style="text-align:center; padding: 200px 20px;"><h1 style="color:#fff;">Article Not Found</h1><a href="blog.html" class="gold-link">Return to Blog</a></div>`;
        return;
      }
      
      const b = doc.data();
      // Format paragraphs properly (convert line breaks to <p> tags)
      const formattedContent = b.content.split('\\n').map(p => p.trim()).filter(p => p.length > 0).map(p => `<p>${p}</p>`).join('');

      container.innerHTML = `
        <header class="article-header reveal-up">
          <div style="position:absolute; inset:0; background: radial-gradient(ellipse at 50% 50%, rgba(212,175,55,0.08) 0%, transparent 70%);"></div>
          <div class="container" style="position:relative; z-index:2;">
            <div class="article-meta">
              <span>${b.category}</span>
              <span style="color:var(--w50)">•</span>
              <span style="color:var(--w50)">${b.date}</span>
            </div>
            <h1 class="article-title">${b.title}</h1>
          </div>
        </header>
        
        <section class="section section--dark" style="padding-top: 0;">
          <div class="container reveal-up" style="transition-delay: 0.2s">
            <a href="blog.html" class="back-btn">&larr; Back to Blog</a>
            
            <img src="${b.image}" alt="${b.title}" class="article-hero-img" style="object-position: ${b.imagePos || 'center center'};" />
            
            <div class="article-content">
              ${formattedContent}
            </div>
          </div>
        </section>
      `;

      // Re-trigger scroll observer for new dynamically injected reveal classes
      if (typeof window.revealObserver !== 'undefined') {
         document.querySelectorAll('.reveal-up').forEach(el => window.revealObserver.observe(el));
      } else {
         // Fallback if observer isn't ready
         setTimeout(() => {
           document.querySelectorAll('.reveal-up').forEach(el => el.classList.add('in-view'));
         }, 100);
      }
      
    } catch(err) {
      console.error(err);
      container.innerHTML = `<div style="text-align:center; padding: 200px 20px;"><h1 style="color:#fff;">Error Loading Article</h1></div>`;
    }
  };
  
  loadArticle();
});
</script>
</body>
</html>
